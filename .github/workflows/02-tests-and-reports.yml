name: 02 - Tests Maven avec rapports

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  test-and-reports-exo13:
    name: Exo 13 - Tests et rapports
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 00_rendu_exercices/exercice13

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Java 21 avec cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: 00_rendu_exercices/exercice13/pom.xml

      - name: Vérifier Java et Maven
        run: |
          java -version
          mvn -version

      - name: Lancer les tests et générer les rapports
        run: mvn clean verify

      - name: Publier les rapports de tests Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-tests-maven-exo13
          path: |
            00_rendu_exercices/exercice13/target/surefire-reports/**
            00_rendu_exercices/exercice13/target/failsafe-reports/**
          if-no-files-found: warn

      - name: Publier le rapport de couverture JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-jacoco-exo13
          path: 00_rendu_exercices/exercice13/target/site/jacoco/**
          if-no-files-found: warn

      - name: Publier les rapports Cucumber BDD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-cucumber-bdd-exo13
          path: |
            00_rendu_exercices/exercice13/target/cucumber-reports/**
            00_rendu_exercices/exercice13/target/cucumber-report.html
            00_rendu_exercices/exercice13/target/cucumber-report.json
          if-no-files-found: warn

